# ==============================================================================
# AI INTELLIGENCE ZONE — Control Arena
# Docker Compose — Node.js Production Stack
# ==============================================================================

services:
  # ── Node.js Application ────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: arena-app
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
    ports:
      - "5000:5000"
    volumes:
      - app-data:/app/data
    networks:
      - arena-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Nginx Reverse Proxy ────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: arena-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      app:
        condition: service_healthy
    networks:
      - arena-network

volumes:
  app-data:
    driver: local
  nginx-logs:
    driver: local

networks:
  arena-network:
    driver: bridge
    name: arena-network
