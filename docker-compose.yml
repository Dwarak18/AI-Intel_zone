# ==============================================================================
# AI INTELLIGENCE ZONE — Control Arena
# Docker Compose — Node.js Production Stack
# ==============================================================================

services:
  # ── PostgreSQL (mirrors Railway PostgreSQL) ────────────────────────
  db:
    image: postgres:16-alpine
    container_name: arena-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: control_arena
      POSTGRES_USER: arena
      POSTGRES_PASSWORD: arena_local_pass
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - arena-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arena -d control_arena"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Node.js Application ────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production
    container_name: arena-app
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://arena:arena_local_pass@db:5432/control_arena
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "80:5000"
      - "5000:5000"
    networks:
      - arena-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  pg-data:
    driver: local

networks:
  arena-network:
    driver: bridge
    name: arena-network
