<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<!-- ADMIN LOGIN — static page served by Vercel, auth via Railway API -->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | AI Intelligence Zone</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root{--accent:#6366f1;--accent2:#8b5cf6}
    body{background:#020617;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;margin:0}
    .login-wrap{width:100%;max-width:440px;padding:1.5rem}
    .login-card{background:#0f172a;border:1px solid #1e293b;border-radius:18px;padding:2.5rem;box-shadow:0 0 80px rgba(99,102,241,.12),0 20px 60px rgba(0,0,0,.5)}
    .brand{text-align:center;margin-bottom:1.75rem}
    .brand-icon{width:64px;height:64px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:1.8rem;box-shadow:0 4px 20px rgba(99,102,241,.4)}
    .brand h1{font-family:'JetBrains Mono',monospace;font-size:1rem;font-weight:700;color:var(--accent);letter-spacing:2px;margin:0}
    .brand p{color:#475569;font-size:.7rem;text-transform:uppercase;letter-spacing:3px;margin:.3rem 0 0}
    .glow{height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin:1.5rem 0}
    .form-label{font-size:.7rem;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:.4rem}
    .form-control{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.75rem 1rem;font-size:.9rem;border-radius:8px}
    .form-control:focus{background:#1e293b;border-color:var(--accent);color:#e2e8f0;box-shadow:0 0 0 3px rgba(99,102,241,.2);outline:none}
    .form-control::placeholder{color:#475569}
    .btn-login{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;padding:.8rem;font-weight:600;border-radius:10px;width:100%;font-size:.95rem;transition:all .25s;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem}
    .btn-login:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(99,102,241,.45)}
    .btn-login:disabled{opacity:.6;pointer-events:none}
    .alert-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5;border-radius:8px;padding:.65rem .9rem;font-size:.8rem;margin-bottom:1rem;display:none}
    .footer-links{text-align:center;margin-top:1.25rem}
    .footer-links a{color:var(--accent);font-size:.8rem;text-decoration:none}
    .footer-note{text-align:center;font-size:.68rem;color:#334155;margin-top:.75rem}
    .spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}
    .particles{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
    .particle{position:absolute;width:2px;height:2px;border-radius:50%;background:var(--accent);animation:float linear infinite}
    @keyframes float{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:.5}90%{opacity:.15}100%{transform:translateY(-10vh) scale(1);opacity:0}}
</style>
</head>
<body>
<div class="particles" id="particles"></div>

<div class="login-wrap" style="position:relative;z-index:1">
  <div class="login-card">
    <div class="brand">
      <div class="brand-icon">⚡</div>
      <h1>AI INTEL ZONE</h1>
      <p>Control Arena v2.0</p>
    </div>
    <div class="glow"></div>

    <div id="errBox" class="alert-err"></div>

    <form id="loginForm" method="POST" action="https://ai-intelzone-production.up.railway.app/auth/login">
      <div class="mb-3">
        <label class="form-label"><i class="bi bi-person-fill me-1"></i>Username</label>
        <input type="text" id="username" name="username" class="form-control" placeholder="Enter admin username" required autofocus autocomplete="username">
      </div>
      <div class="mb-4">
        <label class="form-label"><i class="bi bi-lock-fill me-1"></i>Password</label>
        <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="submitBtn">
        <i class="bi bi-shield-lock-fill"></i>
        <span id="btnText">Authenticate</span>
      </button>
    </form>

    <div class="glow"></div>
    <div class="footer-links">
      Team member? <a href="/team-login">Go to team login <i class="bi bi-arrow-right"></i></a>
    </div>
    <p class="footer-note">Authorized personnel only &nbsp;·&nbsp; All access is logged</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const BACKEND = 'https://ai-intelzone-production.up.railway.app';

  // Animated particles
  const pc = document.getElementById('particles');
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `left:${Math.random()*100}vw;animation-duration:${8+Math.random()*12}s;animation-delay:${Math.random()*10}s;width:${1+Math.random()*3}px;height:${1+Math.random()*3}px`;
    pc.appendChild(p);
  }

  const form = document.getElementById('loginForm');

  // Direct form POST to Railway — Railway sets session cookie and redirects to /admin/
  form.setAttribute('method', 'POST');
  form.setAttribute('action', BACKEND + '/auth/login');
</script>
</body>
</html>
