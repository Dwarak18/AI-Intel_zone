<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Intelligence Zone — Control Arena</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    body { background: #0d1117; color: #e6edf3; }
    #adminSidebar {
      width: 240px; min-height: 100vh;
      background: #161b22; border-right: 1px solid #30363d;
      position: fixed; top: 0; left: 0; z-index: 100;
    }
    #adminSidebar .sidebar-brand { padding: 1.25rem 1rem; border-bottom: 1px solid #30363d; }
    #adminSidebar .nav-link { color: #8b949e; padding: .5rem 1.25rem; border-radius: .375rem; }
    #adminSidebar .nav-link:hover, #adminSidebar .nav-link.active { color: #58a6ff; background: rgba(88,166,255,.1); }
    #adminSidebar .nav-link .bi { margin-right: .5rem; }
    #adminContent { margin-left: 240px; min-height: 100vh; }
    .card { background: #161b22; border: 1px solid #30363d; }
    .card-header { background: #1c2128; border-bottom: 1px solid #30363d; }
    .table { --bs-table-bg: transparent; }
    .table-hover tbody tr:hover { background: rgba(255,255,255,.04); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .live-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#3fb950; animation:pulse 1.4s infinite; }
    .console-output { background:#0d1117; font-family:'Cascadia Code','Fira Code',monospace; font-size:.85rem; height:320px; overflow-y:auto; border:1px solid #30363d; padding:1rem; border-radius:.375rem; }
    textarea.code-input { background:#161b22; color:#e6edf3; font-family:'Cascadia Code','Fira Code',monospace; font-size:.85rem; border:1px solid #30363d; resize:vertical; }
    textarea.code-input:focus { border-color:#58a6ff; box-shadow:0 0 0 .2rem rgba(88,166,255,.2); }
    @media (max-width:767px) { #adminContent { margin-left: 0; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
